[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# La URL se lee de la env-var DATABASE_URL (definida en .env).
#   DATABASE_URL=postgresql+psycopg2://user:pass@host/db?sslmode=require
# No funciona sin DATABASE_URL.
sqlalchemy.url = DATABASE_URL_PLACEHOLDER


[post_write_hooks]

# ── Logging ────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
